<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koop Solutions LLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        koopBlue: '#0055a5',
                        koopCyan: '#00a4e4',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-md w-full bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-2xl flex flex-col items-center space-y-8">
        <!-- Logo -->
        <div class="w-full flex justify-center">
            <img src="images/logo_original.jpg" alt="Koop Solutions Logo" class="rounded-xl w-full object-cover shadow-inner max-h-48">
        </div>

        <!-- Contact Form -->
        <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST" class="w-full space-y-4">
            <input type="hidden" name="_subject" value="New Inquiry from Koop Solutions">
            
            <div>
                <input type="text" name="name" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-koopCyan transition text-sm" placeholder="Your Name">
            </div>
            <div>
                <input type="email" name="email" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-koopCyan transition text-sm" placeholder="Your Email">
            </div>
            <div>
                <textarea name="message" rows="4" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-koopCyan transition text-sm" placeholder="Message"></textarea>
            </div>
            <div>
                <button type="submit" class="w-full bg-gradient-to-r from-koopBlue to-koopCyan text-white font-bold py-3 rounded-lg shadow-lg hover:opacity-90 transition text-sm">
                    Send Message
                </button>
            </div>
        </form>
    </div>

</body>
</html>
